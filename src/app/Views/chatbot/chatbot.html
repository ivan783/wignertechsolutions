<div class="fixed bottom-28 right-6 z-40">

  <!-- Chat Window -->
  <div *ngIf="isOpen"
       class="absolute bottom-0 right-0 w-80 sm:w-96 bg-dark-800 rounded-2xl shadow-2xl border border-white/10 overflow-hidden flex flex-col animate-fade-in-up"
       style="height: 480px;">

    <!-- Header -->
    <div class="flex items-center gap-3 px-5 py-4 bg-gradient-to-r from-primary-600 to-accent-600">
      <div class="w-9 h-9 bg-white/20 rounded-full flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
        </svg>
      </div>
      <div class="flex-1">
        <p class="text-white font-semibold text-sm">Asistente Virtual</p>
        <div class="flex items-center gap-1.5">
          <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
          <span class="text-white/70 text-xs">En línea</span>
        </div>
      </div>
      <button (click)="toggleChat()" class="text-white/70 hover:text-white transition-colors">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Messages -->
    <div id="chat-messages"
         class="flex-1 overflow-y-auto px-4 py-4 space-y-4 scrollbar-thin scrollbar-track-dark-900 scrollbar-thumb-white/10">

      <div *ngFor="let msg of messages"
           class="flex"
           [class.justify-end]="msg.from === 'user'"
           [class.justify-start]="msg.from === 'bot'">

        <!-- Bot avatar -->
        <div *ngIf="msg.from === 'bot'"
             class="w-7 h-7 bg-gradient-to-br from-primary-500 to-accent-500 rounded-full flex items-center justify-center flex-shrink-0 mr-2 mt-1">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
          </svg>
        </div>

        <!-- Bubble -->
        <div class="max-w-[78%]">
          <div class="px-4 py-3 rounded-2xl text-sm whitespace-pre-line leading-relaxed"
               [class.bg-gradient-to-br]="msg.from === 'bot'"
               [class.from-dark-700]="msg.from === 'bot'"
               [class.to-dark-600]="msg.from === 'bot'"
               [class.text-gray-200]="msg.from === 'bot'"
               [class.rounded-tl-sm]="msg.from === 'bot'"
               [class.bg-gradient-to-r]="msg.from === 'user'"
               [class.from-primary-600]="msg.from === 'user'"
               [class.to-accent-600]="msg.from === 'user'"
               [class.text-white]="msg.from === 'user'"
               [class.rounded-tr-sm]="msg.from === 'user'">
            {{ msg.text }}
          </div>
          <p class="text-gray-600 text-xs mt-1"
             [class.text-right]="msg.from === 'user'">
            {{ msg.time | date:'HH:mm' }}
          </p>
        </div>
      </div>

      <!-- Typing Indicator -->
      <div *ngIf="isTyping" class="flex items-center gap-2">
        <div class="w-7 h-7 bg-gradient-to-br from-primary-500 to-accent-500 rounded-full flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h16a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
          </svg>
        </div>
        <div class="bg-dark-700 rounded-2xl rounded-tl-sm px-4 py-3 flex gap-1.5 items-center">
          <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0ms;"></span>
          <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 150ms;"></span>
          <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 300ms;"></span>
        </div>
      </div>
    </div>

    <!-- Quick Replies -->
    <div class="px-4 py-2 flex gap-2 overflow-x-auto border-t border-white/5">
      <button *ngFor="let q of ['💰 Precios', '🚀 Servicios', '📞 Contacto', '⏱ Tiempos']"
              (click)="userInput = q; sendMessage()"
              class="flex-shrink-0 px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full text-xs text-gray-300 transition-colors whitespace-nowrap">
        {{ q }}
      </button>
    </div>

    <!-- Input -->
    <div class="px-4 py-3 border-t border-white/10 flex gap-2">
      <input [(ngModel)]="userInput"
             (keydown)="handleKey($event)"
             placeholder="Escribe tu pregunta..."
             class="flex-1 px-4 py-2.5 bg-dark-900/80 border border-white/10 rounded-xl text-white placeholder-gray-500 text-sm focus:border-primary-500 focus:ring-1 focus:ring-primary-500/20 outline-none transition-all">
      <button (click)="sendMessage()"
              [disabled]="!userInput.trim()"
              class="w-10 h-10 bg-gradient-to-br from-primary-500 to-accent-500 rounded-xl flex items-center justify-center hover:shadow-lg hover:shadow-primary-500/30 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Toggle Button -->
  <button (click)="toggleChat()"
          class="w-14 h-14 bg-gradient-to-br from-primary-500 to-accent-500 rounded-full shadow-2xl hover:shadow-primary-500/50 flex items-center justify-center transform hover:scale-110 transition-all duration-300">
    <svg *ngIf="!isOpen" class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/>
    </svg>
    <svg *ngIf="isOpen" class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
    <!-- Notification dot -->
    <div *ngIf="!isOpen"
         class="absolute -top-1 -right-1 w-4 h-4 bg-accent-500 rounded-full border-2 border-dark-950 flex items-center justify-center">
      <span class="text-white text-xs font-bold leading-none">1</span>
    </div>
  </button>
</div>
